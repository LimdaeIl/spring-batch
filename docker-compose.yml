version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-spring-batch
    restart: always

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: 'spring-batch'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      TZ: 'Asia/Seoul'

    volumes:
      - mysql_data:/var/lib/mysql

    command:
        - '--character-set-server=utf8mb4'
        - '--collation-server=utf8mb4_unicode_ci'

volumes:
  mysql_data: